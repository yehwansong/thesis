<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sun Averager</title>
  <style>
    body { font-family: monospace; padding: 16px; }
    #status { font-size: 14px; margin-bottom: 8px; }
    canvas {
      border: 1px solid #000;
      display: none;
      width: 100vmin;
      height: 100vmin;
      object-fit: fill;
    }
    #log { font-size: 11px; color: #555; background: #f5f5f5; padding: 8px; max-height: 120px; overflow-y: auto; margin-top: 10px; }
  </style>
</head>
<body>
<div id="status">Connecting to Firebase...</div>
<canvas id="canvas"></canvas>
<pre id="log"></pre>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyC72-spUFEX2l3E4vRQawR2MUI-Lu8ijRE",
    authDomain: "seen-117ab.firebaseapp.com",
    databaseURL: "https://seen-117ab-default-rtdb.firebaseio.com",
    projectId: "seen-117ab",
    storageBucket: "seen-117ab.firebasestorage.app",
    messagingSenderId: "21506282802",
    appId: "1:21506282802:web:739a99d712d95ad6ca732b",
    measurementId: "G-3HN2S100KW"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const canvas  = document.getElementById("canvas");
  const ctx     = canvas.getContext("2d");
  const statusEl = document.getElementById("status");
  const logEl    = document.getElementById("log");
  let busy = false;
  let pending = null;
  function log(msg) {
    logEl.textContent = new Date().toLocaleTimeString() + " " + msg + "\n" + logEl.textContent;
  }
  function loadImg(path) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(path);
      img.src = path;
    });
  }
  async function average(paths) {
    if (!paths.length) return;
    statusEl.textContent = `Loading ${paths.length} image(s)...`;
    const images = [];
    for (const path of paths) {
      try {
        images.push(await loadImg(path));
      } catch(e) {
        log("✗ failed: " + e);
      }
    }
    if (!images.length) { statusEl.textContent = "No images loaded."; return; }
    const W = images[0].naturalWidth;
    const H = images[0].naturalHeight;
    const S = Math.min(W, H); // square = shorter side, no distortion
    const off = document.createElement("canvas");
    off.width = S; off.height = S;
    const offCtx = off.getContext("2d");
    const sums = new Float64Array(S * S * 4);
    for (let i = 0; i < images.length; i++) {
      statusEl.textContent = `Averaging ${i+1} / ${images.length}...`;
      const iw = images[i].naturalWidth;
      const ih = images[i].naturalHeight;
      // center-crop to square
      const cropSize = Math.min(iw, ih);
      const sx = (iw - cropSize) / 2;
      const sy = (ih - cropSize) / 2;
      offCtx.clearRect(0, 0, S, S);
      offCtx.drawImage(images[i], sx, sy, cropSize, cropSize, 0, 0, S, S);
      const px = offCtx.getImageData(0, 0, S, S).data;
      for (let p = 0; p < px.length; p++) sums[p] += px[p];
    }
    canvas.width = S;
    canvas.height = S;
    canvas.style.display = "block";
    const result = ctx.createImageData(S, S);
    for (let p = 0; p < result.data.length; p++) {
      result.data[p] = Math.round(sums[p] / images.length);
    }
    ctx.putImageData(result, 0, 0);
    statusEl.textContent = `Live — averaged ${images.length} image(s). Listening...`;
    log(`✓ averaged ${images.length} image(s)`);
  }
  async function process(data) {
    const paths = [...new Set(Object.values(data).map(d => d.value))];
    log(`picks: ${paths.length} unique`);
    if (busy) { pending = paths; return; }
    busy = true;
    await average(paths);
    busy = false;
    if (pending) { const p = pending; pending = null; process({ _: p.map(v => ({ value: v })) }); }
  }
  onValue(ref(db, "picks"), snapshot => {
    if (!snapshot.exists()) { statusEl.textContent = "No picks yet. Touch the picker page."; return; }
    process(snapshot.val());
  });
</script>
</body>
</html>
