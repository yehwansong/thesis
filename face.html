<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.1);
      filter: contrast(1.3);
      background: black;
      opacity: 0;
    }
    video.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9409.mp4" playsinline muted preload="auto"></video>
  <script>
    let playing = false;
    const video = document.getElementById("vid");

    // Pre-seek and pre-buffer at page load
    video.load();
    video.addEventListener("canplaythrough", () => {
      video.currentTime = 0;
    }, { once: true });

    async function handleTouch() {
      if (playing) return;
      playing = true;
      video.classList.add("visible");

      try {
        await video.play();
      } catch (err) {
        console.error("Playback failed:", err);
        video.classList.remove("visible");
        playing = false;
        return;
      }

      video.onended = () => {
        video.classList.remove("visible");
        video.pause();
        video.currentTime = 0;
        playing = false;
      };
    }

    window.addEventListener("touchstart", handleTouch, { passive: true });
  </script>
</body>
</html>
